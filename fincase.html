<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<meta name="format-detection" content="telephone=no" />
		<link rel="icon" href="/favicon.ico" />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles/common.css" />
		<link rel="stylesheet" href="styles/fincase.css" />
		<title>Ангелы Чата — Финансовый эффект</title>
	</head>
	<body>
		<div class="background-picture background-picture--top"></div>

		<h1 class="header">Продажи в чате</h1>

		<ul class="list">
			<li>
				<div class="desc">
					<span>Клиенты, не перешедшие по ссылке, месяц</span>
				</div>
				<div class="value">
					<span>3 520</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>CR</span>
				</div>
				<div class="value">
					<span>5,5 %</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>Дополнительные выдачи, штук</span>
				</div>
				<div class="value">
					<span>194</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>LTV на один кредит</span>
				</div>
				<div class="value">
					<span>33 700 ₽</span>
				</div>
			</li>
		</ul>

		<ul class="list list--inverse">
			<li>
				<div class="desc">
					<span>Затраты на доработку</span>
				</div>
				<div class="value">
					<span>3 000 000 ₽</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>Дополнительная прибыль, год</span>
				</div>
				<div class="value">
					<span>75 446 720 ₽</span>
				</div>
			</li>
		</ul>

		<div class="approve">
			<img src="/img/checkmark.svg" alt="" />
			<p>Проверено финансами</p>
		</div>

		<div class="background-picture background-picture--bottom"></div>
	</body>
</html>
