<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<link rel="stylesheet" href="/styles/common.css" />
		<link rel="stylesheet" href="/styles/chat.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<title>Чат</title>
	</head>
	<body>
		<div class="header">
			<div class="bg"></div>
			<h1 class="title">Чат</h1>
			<img class="phone-icon" src="/img/phone.svg" alt="" />
		</div>
		<div class="chat js-chat"></div>
		<div class="footer">
			<div class="message-box">
				<div>
					<img class="attach-icon" src="/img/attach.svg" alt="" />
				</div>
				<div class="fit-width">
					<input type="text" placeholder="Напишите сообщение" readonly />
				</div>
				<div>
					<img class="send-icon" src="/img/send.svg" alt="" />
				</div>
			</div>
			<div class="tabbar">
				<div class="item">
					<img class="icon" src="/img/home.svg" alt="" />
					<span class="desc">Главная</span>
				</div>
				<div class="item">
					<img class="icon" src="/img/card.svg" alt="" />
					<span class="desc">Оплата</span>
				</div>
				<div class="item">
					<img class="icon" src="/img/fire.svg" alt="" />
					<span class="desc">Каталог</span>
				</div>
				<div class="item item--active">
					<img class="icon" src="/img/chat.svg" alt="" />
					<span class="desc">Чат</span>
				</div>
				<div class="item">
					<img class="icon" src="/img/more.svg" alt="" />
					<span class="desc">Ещё</span>
				</div>
			</div>
		</div>
	</body>

		const messages = [

				</div>
			</div>
			`,
			`

						&bull;

					</p>
					<div class="text-wrap">
						<img class="bot-icon" src="/img/angel-colored.png" alt="" />
						<p class="text">
							Здравствуйте! С заботой о вас мы приготовили предложение на кредит
							наличными на ваши цели для себя, семьи и дома.
							<br /><br />Это совершенно новые условия, они приятно вас удивят:
							<br />• Кредит до 3 000 000 руб. <br />• Платёж до 52 860 руб.
							<br />• Срок до 84 мес. <br /><br />Заполнить заявку удобно,
							ответьте на пару вопросов.
						</p>
					</div>
				</div>
			</div>
			`,
			`

					</p>

						<img class="bot-icon" src="/img/angel-colored.png" alt="" />

				</div>
			</div>

							Выберите предложение и отправьте цифру 1, 2 или 3:
							<br />

							проценты при выполнении условий акции «Снижаем до О» <br />2.
							<span class="highlight">2,9% годовых</span> - снизим ежемесячный
							платёж с услугой «Гарантия оптимальной ставки» <br />3. 24,9%
							годовых - кредит на стандартных условиях
						</p>
					</div>
				</div>
			</div>
			`,

					<p class="time"><span>${currentTime}</span></p>
					<p class="text">1</p>
				</div>
			</div>
			`,

				<div class="wrap">
					<p class="time">
						<span class="author">Ангел</span>
						&bull;
						<span>${currentTime}</span>
					</p>
					<div class="text-wrap">
						<img class="bot-icon" src="/img/angel-colored.png" alt="" />
						<p class="text">
							Нужна минута и мы узнаем решение по заявке.<br /><br />Предлагаем
							во время рассмотрения подтвердить учетную запись на госуслугах, в
							дальнейшем это позволит вам получать большую сумму кредита.
						</p>
					</div>
				</div>
			</div>
			`,
			`

				<div class="wrap">
					<p class="time">
						<span class="author">Ангел</span>
						&bull;

		];

		let messageIndex = 0;

		const chatBox = document.getElementsByClassName("js-chat")[0];

		new Promise((resolve, reject) => {
			resolve(messages[messageIndex]);
		})
			.then((result) => {
				chatBox.insertAdjacentHTML("beforeend", result);
				document.documentElement.scrollTop += 500;

				return new Promise((resolve, reject) => {
					messageIndex++;
					setTimeout(() => resolve(messages[messageIndex]), 1000);
				});
			})

				document.documentElement.scrollTop += 500;

				document.documentElement.scrollTop += 500;

				document.documentElement.scrollTop += 500;

				return new Promise((resolve, reject) => {
					messageIndex++;
					setTimeout(() => resolve(messages[messageIndex]), 2000);
				});
			})
			.then((result) => {
				chatBox.insertAdjacentHTML("beforeend", result);
				document.documentElement.scrollTop += 500;
			});
	</script>
</html>
