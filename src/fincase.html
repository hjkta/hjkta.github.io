<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles/common.css" />
		<link rel="stylesheet" href="styles/fincase.css" />
		<title>Финансовый эффект</title>
	</head>
	<body>
		<div class="background-picture background-picture--top"></div>

		<h1 class="header">Продажи в чате</h1>

		<ul class="list">
			<li>
				<div class="desc">
					<span>Клиенты, не перешедшие по ссылке, месяц</span>
				</div>
				<div class="value">
					<span>3 520</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>CR</span>
				</div>
				<div class="value">
					<span>5,5 %</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>Дополнительные выдачи, штук</span>
				</div>
				<div class="value">
					<span>194</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>LTV на один кредит</span>
				</div>
				<div class="value">
					<span>33 700 ₽</span>
				</div>
			</li>
		</ul>

		<ul class="list list--inverse">
			<li>
				<div class="desc">
					<span>Затраты на доработку</span>
				</div>
				<div class="value">
					<span>3 000 000 ₽</span>
				</div>
			</li>
			<li>
				<div class="desc">
					<span>Дополнительная прибыль, год</span>
				</div>
				<div class="value">
					<span>75 446 720 ₽</span>
				</div>
			</li>
		</ul>

		<div class="approve">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				width="24"
				height="24"
				fill="currentColor"
				class="bi bi-check-all"
				viewBox="0 0 16 16"
			>
				<path
					d="M8.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L2.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093L8.95 4.992a.252.252 0 0 1 .02-.022zm-.92 5.14.92.92a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 1 0-1.091-1.028L9.477 9.417l-.485-.486-.943 1.179z"
				/>
			</svg>
			<p>Проверено финансами</p>
		</div>

		<div class="background-picture background-picture--bottom"></div>
	</body>
</html>
